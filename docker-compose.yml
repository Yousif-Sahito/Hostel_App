version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: mess_app_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mess_app}
    ports:
      - "3307:3306"  # Use 3307 to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mess_app_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_this}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@hostel.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root123}@db:3306/${MYSQL_DATABASE:-mess_app}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma db push --schema=./prisma/schema.prisma --accept-data-loss &&
        node scripts/seedAdmin.js &&
        node scripts/seedSettings.js &&
        node server.js
      "

  # Flutter Web Frontend
  frontend:
    build:
      context: ./mess_app_frontend
      dockerfile: Dockerfile
    container_name: mess_app_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
